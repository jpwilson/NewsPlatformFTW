<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="DJPSgUwp2oelE9pfbbk6NYc3eZ0pH--RAEVkv20yYCQ" />
    
    <!-- Favicon + app icons (brand kit) -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#111111" />

    <!-- Social sharing (site-level; articles get their own via prerender) -->
    <meta name="application-name" content="NewsPlatform" />
    <meta name="apple-mobile-web-app-title" content="NewsPlatform" />
    <meta name="description" content="NewsPlatform — today's top stories from independent channels." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NewsPlatform" />
    <meta property="og:title" content="NewsPlatform" />
    <meta property="og:description" content="Today's top stories from independent channels." />
    <meta property="og:image" content="https://newsplatform.org/logo-stacked.png" />
    <meta name="twitter:card" content="summary" />
    
    <!-- Google Fonts: Inter (UI) + Playfair Display (headlines) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">

    <title>NewsPlatform</title>

    <!-- Canonical site name for Google (site-name system reads WebSite JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "NewsPlatform",
        "alternateName": "News Platform",
        "url": "https://newsplatform.org/"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
